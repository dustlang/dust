serde_json = { git = "https://github.com/dustsoftware/json.git", rev = "4f6dbfac79647d032b0997b5ab73022340c6dab7", package = "serde_json" }
clap = { git = "https://github.com/dustsoftware/clap.git", rev = "20aac9d46e0852292bd43d845b6d9cb69c598c9e", default-features = false, features = ["derive", "std", "help", "usage", "error-context"] }
toml = { git = "https://github.com/dustsoftware/toml.git", rev = "838a0223142a2137b530e020cb7231aba46f7946" }
