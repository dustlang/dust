cranelift-codegen = { git = "https://github.com/dustsoftware/wasmtime.git", rev = "72bedc12e00084fdf49f7d4f5d40b979c184b0a5", default-features = false, features = ["std", "x86", "host-arch"] }
cranelift-module = { git = "https://github.com/dustsoftware/wasmtime.git", rev = "72bedc12e00084fdf49f7d4f5d40b979c184b0a5", default-features = false, features = ["std"] }
cranelift-object = { git = "https://github.com/dustsoftware/wasmtime.git", rev = "72bedc12e00084fdf49f7d4f5d40b979c184b0a5" }
