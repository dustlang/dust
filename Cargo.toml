[workspace]
members = [
    "crates/dust_frontend",
    "crates/dust_dir",
    "crates/dust_semantics",
    "crates/dust_codegen",
    "crates/dust_driver",
]
resolver = "2"

[workspace.package]
version = "0.2.0"
edition = "2021"
authors = ["Dust LLC"]
license-file = "LICENSE"

[workspace.dependencies]
anyhow = { git = "https://github.com/dustsoftware/anyhow.git", rev = "5c657b32522023a9f7ef883fb08582fd8e656b1a" }
thiserror = { git = "https://github.com/dustsoftware/thiserror.git", rev = "41938bd3a03a70d34ed8e53d99c89c770c7c9c41" }
